# ==============================================================
# Smart Land Management Copilot v3.0 — Docker Compose
# ==============================================================
# Production deployment with optional monitoring.
# ==============================================================

version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: land-copilot
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    volumes:
      - app-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"

volumes:
  app-data:
    driver: local
# Ingress — external traffic routing via Minikube NGINX
# Access: http://smartland.local (add to /etc/hosts → 127.0.0.1 smartland.local)
#
# Or via Minikube tunnel:
#   minikube tunnel
#   kubectl get ingress -n smartland
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smartland-ingress
  namespace: smartland
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: smartland.local
      http:
        paths:
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 8001
          - path: /api/lands
            pathType: Prefix
            backend:
              service:
                name: land-service
                port:
                  number: 8002
          - path: /api/predictions
            pathType: Prefix
            backend:
              service:
                name: prediction-service
                port:
                  number: 8003
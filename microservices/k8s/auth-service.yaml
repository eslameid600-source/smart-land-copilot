# Auth Service — Kubernetes Deployment + Service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: smartland
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: smartland/auth-service:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: smartland-secrets
                  key: jwt-secret
            - name: ACCESS_TOKEN_EXPIRE
              value: "60"
            - name: REFRESH_TOKEN_EXPIRE
              value: "7"
          livenessProbe:
            httpGet:
              path: /api/auth/health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/auth/health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: smartland
  labels:
    app: auth-service
spec:
  type: ClusterIP
  selector:
    app: auth-service
  ports:
    - port: 8001
      targetPort: 8001
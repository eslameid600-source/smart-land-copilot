# Secrets for Smart Land Microservices
#
# CREATE:
#   kubectl apply -f k8s/secrets.yaml
#
# IMPORTANT: In production, use Sealed Secrets or external
# secret managers (Vault, AWS Secrets Manager).
---
apiVersion: v1
kind: Secret
metadata:
  name: smartland-secrets
  namespace: smartland
type: Opaque
stringData:
  jwt-secret: "smartland-production-secret-2025-change-me"
  glm-api-key: ""
  gee-api-key: ""
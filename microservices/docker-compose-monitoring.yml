# Smart Land Management Copilot — Monitoring Stack
# ===================================================
# Prometheus + Grafana + Loki + Tempo + Alertmanager
# + cAdvisor (containers) + Node Exporter (host)
#
# التشغيل:
#   cd microservices/monitoring
#   docker compose -f docker-compose-monitoring.yml up -d
#
# الوصول:
#   Grafana:        http://localhost:3000  (admin / admin)
#   Prometheus:     http://localhost:9090
#   Alertmanager:   http://localhost:9093
#   Loki:           http://localhost:3100
#   Tempo:          http://localhost:3200

version: "3.9"

services:

  # ══════════════════════════════════════════
  # 1. Prometheus — جمع المقاييس
  # ══════════════════════════════════════════
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: smartland-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--storage.tsdb.retention.size=1GB'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    depends_on:
      - alertmanager
    networks:
      - monitoring-net

  # ══════════════════════════════════════════
  # 2. Alertmanager — إدارة التنبيهات
  # ══════════════════════════════════════════
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: smartland-alertmanager
    restart: unless-stopped
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - monitoring-net

  # ══════════════════════════════════════════
  # 3. Grafana — لوحات المراقبة
  # ══════════════════════════════════════════
  grafana:
    image: grafana/grafana:11.3.0
    container_name: smartland-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_URL:-http://localhost:3000}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/smartland-dashboard.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana-provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - monitoring-net

  # ══════════════════════════════════════════
  # 4. Loki — تجميع السجلات
  # ══════════════════════════════════════════
  loki:
    image: grafana/loki:2.9.7
    container_name: smartland-loki
    restart: unless-stopped
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring-net

  # ══════════════════════════════════════════
  # 5. Tempo — تتبع موزّع (Traces)
  # ══════════════════════════════════════════
  tempo:
    image: grafana/tempo:2.5.0
    container_name: smartland-tempo
    restart: unless-stopped
    ports:
      - "${TEMPO_PORT:-3200}:3200"   # HTTP API
      - "4317:4317"                    # OTLP gRPC
      - "4318:4318"                    # OTLP HTTP
    volumes:
      - ./tempo-config.yml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    command: -config.file=/etc/tempo.yaml
    networks:
      - monitoring-net

  # ══════════════════════════════════════════
  # 6. Node Exporter — مقاييس النظام المضيف
  # ══════════════════════════════════════════
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: smartland-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    command:
      - '--path.rootfs=/host'
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(dev|proc|sys|var/lib/docker/.+)($|/)'
    volumes:
      - /:/host:ro,rslave
    networks:
      - monitoring-net

  # ══════════════════════════════════════════
  # 7. cAdvisor — مقاييس الحاويات
  # ══════════════════════════════════════════
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: smartland-cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    networks:
      - monitoring-net

# ═══════════════════════════════════════════════════════════════
# Volumes
# ═══════════════════════════════════════════════════════════════
volumes:
  prometheus_data:
    name: smartland-prometheus-data
  grafana_data:
    name: smartland-grafana-data
  loki_data:
    name: smartland-loki-data
  tempo_data:
    name: smartland-tempo-data

# ═══════════════════════════════════════════════════════════════
# Network
# ═══════════════════════════════════════════════════════════════
networks:
  monitoring-net:
    name: smartland-monitoring
    driver: bridge
# Smart Land Management Copilot — Full Stack + Monitoring
# ==========================================================
# يشمل: Kong Gateway + 3 Services + Ollama + Monitoring Stack + Sentry
#
# التشغيل الكامل:
#   cd microservices/monitoring
#   docker compose -f docker-compose-full.yml up -d
#
# الوصول:
#   API Gateway:    http://localhost:8000
#   Grafana:        http://localhost:3000  (admin/admin)
#   Prometheus:     http://localhost:9090
#   Loki:           http://localhost:3100
#   Tempo Traces:   http://localhost:3200
#   Alertmanager:   http://localhost:9093
#   Sentry (local): http://localhost:9000

version: "3.9"

services:

  # ════════════════════════════════════════
  # MICROSERVICES
  # ════════════════════════════════════════

  # ── Kong API Gateway ──
  api-gateway:
    image: kong:3.8
    container_name: smartland-gateway
    ports:
      - "8000:8000"
      - "8444:8444"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8444"
      KONG_LOG_LEVEL: info
      KONG_PLUGINS: request-transformer,cors,rate-limiting
    volumes:
      - ../api-gateway/kong.yml:/var/lib/kong/kong.yml:ro
    depends_on:
      auth-service:
        condition: service_healthy
      land-service:
        condition: service_healthy
      prediction-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - smartland-net
    profiles: [full]

  # ── Auth Service ──
  auth-service:
    build:
      context: ../..
      dockerfile: microservices/auth-service/Dockerfile
    container_name: smartland-auth
    environment:
      JWT_SECRET: "${JWT_SECRET:-smartland-production-secret-2025}"
      ACCESS_TOKEN_EXPIRE: "60"
      REFRESH_TOKEN_EXPIRE: "7"
      SENTRY_DSN: "${SENTRY_DSN:-}"
      SENTRY_ENVIRONMENT: "${SENTRY_ENVIRONMENT:-development}"
      SENTRY_TRACES_SAMPLE: "0.1"
      LOKI_URL: "http://loki:3100"
    volumes:
      - ../shared:/app/shared:ro
      - ./monitoring:/app/monitoring:ro
    expose:
      - "8001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/auth/health')"]
      interval: 8s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - smartland-net
      - monitoring-net

  # ── Land Service ──
  land-service:
    build:
      context: ../..
      dockerfile: microservices/land-service/Dockerfile
    container_name: smartland-lands
    environment:
      GEE_API_KEY: ""
      SENTRY_DSN: "${SENTRY_DSN:-}"
      SENTRY_ENVIRONMENT: "${SENTRY_ENVIRONMENT:-development}"
      SENTRY_TRACES_SAMPLE: "0.1"
      LOKI_URL: "http://loki:3100"
    volumes:
      - ../shared:/app/shared:ro
      - ../../data:/app/legacy/data:ro
      - ../../search_engine.py:/app/legacy/search_engine.py:ro
      - ../../geological:/app/legacy/geological:ro
      - ./monitoring:/app/monitoring:ro
    expose:
      - "8002"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/api/lands/health')"]
      interval: 8s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - smartland-net
      - monitoring-net

  # ── Prediction Service ──
  prediction-service:
    build:
      context: ../..
      dockerfile: microservices/prediction-service/Dockerfile
    container_name: smartland-predictions
    environment:
      GLM_API_KEY: "${GLM_API_KEY:-}"
      GLM_BASE_URL: "${GLM_BASE_URL:-https://openrouter.ai/api/v1/chat/completions}"
      GLM_MODEL: "${GLM_MODEL:-glm-4-flash}"
      SENTRY_DSN: "${SENTRY_DSN:-}"
      SENTRY_ENVIRONMENT: "${SENTRY_ENVIRONMENT:-development}"
      SENTRY_TRACES_SAMPLE: "0.1"
      LOKI_URL: "http://loki:3100"
    volumes:
      - ../shared:/app/shared:ro
      - ./monitoring:/app/monitoring:ro
    expose:
      - "8003"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/api/predictions/health')"]
      interval: 8s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - smartland-net
      - monitoring-net

  # ════════════════════════════════════════
  # MONITORING STACK
  # ════════════════════════════════════════

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: smartland-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--storage.tsdb.retention.size=1GB'
      - '--web.enable-lifecycle'
    depends_on:
      - alertmanager
    networks:
      - monitoring-net
    profiles: [monitoring, full]

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: smartland-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command: ['--config.file=/etc/alertmanager/alertmanager.yml']
    networks:
      - monitoring-net
    profiles: [monitoring, full]

  grafana:
    image: grafana/grafana:11.3.0
    container_name: smartland-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana-provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - monitoring-net
    profiles: [monitoring, full]

  loki:
    image: grafana/loki:2.9.7
    container_name: smartland-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring-net
    profiles: [monitoring, full]

  tempo:
    image: grafana/tempo:2.5.0
    container_name: smartland-tempo
    restart: unless-stopped
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./monitoring/tempo-config.yml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    command: -config.file=/etc/tempo.yaml
    networks:
      - monitoring-net
    profiles: [monitoring, full]

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: smartland-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /:/host:ro,rslave
    networks:
      - monitoring-net
    profiles: [monitoring, full]

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: smartland-cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - monitoring-net
    profiles: [monitoring, full]

  # ════════════════════════════════════════
  # SENTRY SELF-HOSTED (مجاني — محلي)
  # ════════════════════════════════════════
  sentry:
    image: getsentry/self-hosted:latest
    container_name: smartland-sentry
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      SENTRY_SECRET_KEY: "${SENTRY_SECRET_KEY:-super-secret-key-change-me}"
      SENTRY_URL: "http://localhost:9000"
      # إعدادات بسيطة — للإنتاج استخدم sentry/self-hosted مع PostgreSQL + Redis كاملة
    volumes:
      - sentry_data:/data
    networks:
      - monitoring-net
    profiles: [sentry, full]

# ═══════════════════════════════════════════════════════════════
# Volumes
# ═══════════════════════════════════════════════════════════════
volumes:
  prometheus_data:
    name: smartland-prometheus-data
  grafana_data:
    name: smartland-grafana-data
  loki_data:
    name: smartland-loki-data
  tempo_data:
    name: smartland-tempo-data
  sentry_data:
    name: smartland-sentry-data

# ═══════════════════════════════════════════════════════════════
# Networks
# ═══════════════════════════════════════════════════════════════
networks:
  smartland-net:
    name: smartland-msa
    driver: bridge
  monitoring-net:
    name: smartland-monitoring
    driver: bridge
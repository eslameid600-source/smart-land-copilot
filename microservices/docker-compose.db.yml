# ════════════════════════════════════════════════════════════
# Smart Land Management Copilot — Docker Compose (DB + Redis)
# ════════════════════════════════════════════════════════════
# الاستخدام:
#   docker compose -f docker-compose.db.yml up -d
#   docker compose -f docker-compose.db.yml down -v   (حذف البيانات)
#
# ملاحظة: هذا الملف للاختبار والتطوير المحلي فقط.
#        للاستخدام الإنتاجي، استخدم k8s/deployment.yaml
# ════════════════════════════════════════════════════════════

version: "3.9"

services:

  # ─── PostgreSQL 16 ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: smartland-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-smartland}
      POSTGRES_USER: ${DB_USER:-smartland}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartland123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C"
      PGLOCALE: "ar_EG.UTF-8"
      LC_COLLATE: "ar_EG.UTF-8"
      LC_CTYPE: "ar_EG.UTF-8"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-smartland} -d ${DB_NAME:-smartland}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ─── Redis 7 ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: smartland-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'service']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: 'warnings'
      repeat_interval: 4h

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://grafana:3000/api/alertmanager/grafana/config/api/v1/receivers'
        send_resolved: true

  - name: 'critical'
    webhook_configs:
      - url: 'http://grafana:3000/api/alertmanager/grafana/config/api/v1/receivers'
        send_resolved: true

  - name: 'warnings'
    webhook_configs:
      - url: 'http://grafana:3000/api/alertmanager/grafana/config/api/v1/receivers'
        send_resolved: true
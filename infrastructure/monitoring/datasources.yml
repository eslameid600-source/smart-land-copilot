# Grafana Provisioning — Datasources
# ====================================
# يُحمَّل تلقائياً عند بدء Grafana

apiVersion: 1

datasources:
  # ── Prometheus ──
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      httpMethod: POST

  # ── Loki (Logs) ──
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData:
      maxLines: 1000

  # ── Tempo (Traces) ──
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: true
    jsonData:
      serviceMap:
        datasourceUid: Prometheus
      tracesToLogs:
        datasourceUid: Loki
        tags: ['service', 'level']
        mappedTags: [{ key: 'service', value: 'service' }]
      tracesToMetrics:
        datasourceUid: Prometheus
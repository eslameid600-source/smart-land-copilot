name: Smart Land Copilot CI

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ══════════════════════════════════════════════
  # 1. Code Quality & Linting
  # ══════════════════════════════════════════════
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # ══════════════════════════════════════════════
  # 2. Unit & Integration Tests
  # ══════════════════════════════════════════════
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: smartland
          POSTGRES_PASSWORD: smartland_secret
          POSTGRES_DB: smart_land
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://smartland:smartland_secret@localhost:5432/smart_land
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-jwt-secret
          AI_PROVIDER: mock
          ERP_ENABLED: false
        run: |
          pytest tests/ -v --tb=short \
            --ignore=tests/e2e \
            --ignore=tests/simulation \
            --ignore=tests/load_tests \
            -x \
            --junitxml=test-results.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  # ══════════════════════════════════════════════
  # 3. Security Scan (Bandit)
  # ══════════════════════════════════════════════
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run Bandit
        run: bandit -r . -f json -o bandit_report.json || true
      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit_report.json
      - name: Check high severity
        run: |
          python -c "
          import json
          with open('bandit_report.json') as f:
              data = json.load(f)
          high = [i for i in data.get('results', []) if i.get('issue_severity') == 'HIGH']
          if high:
              print(f'::warning::Found {len(high)} HIGH severity issues')
          else:
              print('No high severity issues found')
          "

  # ══════════════════════════════════════════════
  # 4. Bot Simulation
  # ══════════════════════════════════════════════
  simulation:
    name: Bot Simulation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run simulation
        run: python tests/simulation/run_bots.py
        env:
          AI_PROVIDER: mock
          PYTHONIOENCODING: utf-8

  # ══════════════════════════════════════════════
  # 5. Docker Build Check
  # ══════════════════════════════════════════════
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test, security]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build production image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: false
          tags: smart-land-copilot:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build test image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: test
          push: false
          tags: smart-land-copilot:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Test with Docker
        run: docker run --rm smart-land-copilot:test
# ==============================================================
# Smart Land Management Copilot v3.0 — CI/CD Pipeline
# ==============================================================
# GitHub Actions workflow for testing, linting, and deployment.
# ==============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # --- Test Job ---
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run linting (ruff)
        run: |
          pip install ruff
          ruff check . --ignore tests/

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing --junitxml=test-results.xml
        env:
          MOCK_MODE: "true"
          GLM_API_KEY: ""

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # --- Build Job ---
  build:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: land-copilot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --- Security Scan ---
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run safety check
        run: |
          pip install safety
          pip install -r requirements.txt
          safety check --json || true

      - name: Bandit security scan
        run: |
          pip install bandit
          bandit -r . -x tests/,venv/ -f json || true
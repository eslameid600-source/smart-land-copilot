# ==============================================================
# Smart Land Copilot Full CI/CD
# ==============================================================
# GitHub Actions workflow for testing, security, linting, and Docker build.
# ==============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# إضافة concurrency لتجنب التشغيل المزدوج
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# تحديد صلاحيات محدودة
permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 ruff pytest pytest-cov bandit safety

      - name: Security Scan with Bandit
        run: |
          bandit -r api/ core/ -f json -o bandit_report.json || true
          safety check || true

      - name: Lint with Flake8
        run: |
          flake8 api/ core/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint with Ruff
        run: |
          ruff check api/ core/ --ignore-path tests

      - name: Type Check with MyPy
        run: |
          mypy api/ || true

      - name: Run Tests with Coverage
        env:
          PYTHONPATH: .
          MOCK_MODE: "true"
          GLM_API_KEY: ""
          SLOWAPI_ENABLED: "false"
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          REDIS_HOST: "localhost"
          REDIS_PORT: "6379"
          JWT_SECRET: "test-jwt-secret"
          AI_PROVIDER: "mock"
          ERP_ENABLED: "false"
        run: |
          pytest tests/ --cov=api/ --cov=core/ --cov-report=xml --cov-report=html

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  docker-build-push:
    runs-on: ubuntu-latest
    needs: test-and-lint
    if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: test
          push: true
          tags: |
            land-copilot:${{ github.sha }}
            land-copilot:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
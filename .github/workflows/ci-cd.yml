# ==============================================================
# Smart Land Copilot Full CI/CD
# ==============================================================
# GitHub Actions workflow for testing, security, linting, and Docker build.
# ==============================================================

name: Smart Land Copilot Full CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  MOCK_MODE: "true"

jobs:
  # --- 1. Syntax Check ---
  syntax-check:
    name: Python Syntax Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Check Python syntax
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          find . -name "*.py" -not -path "./venv/*" -not -path "./.venv/*" -not -path "./__pycache__/*" -exec python -m py_compile {} \;
          echo "✅ All Python files have valid syntax"

  # --- 2. Lint (Flake8 + Ruff + mypy + black + isort) ---
  lint:
    name: Code Quality (Flake8 + Ruff + mypy + black + isort)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-lint-pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-lint-pip-
      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 ruff mypy black isort
      - name: Run flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=venv,.venv,__pycache__,tests/e2e,tests/simulation,tests/load_tests || true
          echo "✅ Flake8 check completed"
      - name: Run ruff
        run: |
          ruff check . --ignore-path tests
          echo "✅ Ruff check completed"
      - name: Run mypy
        run: |
          mypy api/ core/ --ignore-missing-imports || true
          echo "✅ mypy type check completed"
      - name: Run black
        run: |
          black --check --diff . --exclude="/(venv|.venv|__pycache__|tests/e2e|tests/simulation|tests/load_tests)/" || true
          echo "✅ black formatting check completed"
      - name: Run isort
        run: |
          isort --check-only --diff . --skip "venv" --skip ".venv" --skip "__pycache__" || true
          echo "✅ isort import check completed"

  # --- 3. Security Scan ---
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-security-pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-security-pip-
      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety trufflehog
      - name: Run Bandit
        run: |
          bandit -r . -x tests/,venv/,.venv,__pycache__,web/,microservices/ -f json -o bandit_report.json || true
          echo "✅ Bandit scan completed"
      - name: Run Safety check
        run: |
          safety check --json || echo "⚠️ Safety check completed with warnings (non-blocking)"
          echo "✅ Safety check completed"
      - name: Run truffleHog secrets scan
        run: |
          trufflehog filesystem . --json > trufflehog_report.json 2>&1 || true
          echo "✅ TruffleHog secrets scan completed"
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit_report.json
            trufflehog_report.json
          retention-days: 30

  # --- 4. Tests with Coverage ---
  test:
    name: Run Tests with Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --ignore=tests/e2e \
            --ignore=tests/simulation \
            --ignore=tests/load_tests \
            --cov=./ \
            --cov-report=xml \
            --cov-report=term \
            --cov-fail-under=80 \
            -x
        env:
          MOCK_MODE: "true"
          GLM_API_KEY: ""
          SLOWAPI_ENABLED: "false"
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          REDIS_HOST: "localhost"
          REDIS_PORT: "6379"
          JWT_SECRET: "test-jwt-secret"
          AI_PROVIDER: "mock"
          ERP_ENABLED: "false"
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage.xml
          retention-days: 30

  # --- 5. Docker Build & Push ---
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [syntax-check, lint, security, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: test
          push: true
          tags: |
            land-copilot:${{ github.sha }}
            land-copilot:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Health check
        run: |
          echo "🏥 Docker image built successfully"
          echo "Image: land-copilot:${{ github.sha }}"

  # --- 6. Notify on Failure ---
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [syntax-check, lint, security, test, build]
    if: failure()
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: "ci-cd-notifications"
          slack-message: |
            ❌ CI/CD pipeline failed for ${{ github.repository }} on ${{ github.ref }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
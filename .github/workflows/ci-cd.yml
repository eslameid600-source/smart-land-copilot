# ==============================================================
# Smart Land Copilot Simplified CI/CD
# ==============================================================
# GitHub Actions workflow for testing, linting (ruff only), and Docker build.
# - Removed strict tools: Bandit, Flake8, mypy strict
# - Kept: ruff linting, pytest with coverage, CodeQL, Docker build
# ==============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# إضافة concurrency لتجنب التشغيل المزدوج
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# صلاحيات محدودة (Principle of Least Privilege)
permissions:
  contents: read
  issues: write
  pull-requests: write
  security-events: write
  actions: read

env:
  SCAN_PATHS: "api/ core/ web/ ui/ services/ infrastructure/"
  PYTHON_VERSION: "3.12"
  MAX_FILE_SIZE_MB: "10"

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Lint & Format (ruff only — simplified)
  # ──────────────────────────────────────────────────────────────
  lint-and-format:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Validate prerequisites
        run: |
          test -f requirements.txt || (echo "::error::requirements.txt not found" && exit 1)
          test -f requirements-dev.txt || (echo "::error::requirements-dev.txt not found" && exit 1)
          test -f Dockerfile || (echo "::error::Dockerfile not found" && exit 1)

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint with Ruff
        run: |
          ruff check ${{ env.SCAN_PATHS }} \
            --line-length=120 \
            --output-format=github

  # ──────────────────────────────────────────────────────────────
  # Job 2: Tests with Coverage (pytest with threshold, mock env)
  # ──────────────────────────────────────────────────────────────
  test-and-coverage:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run Tests with Coverage
        env:
          PYTHONPATH: .
          MOCK_MODE: "true"
          GLM_API_KEY: ""
          SLOWAPI_ENABLED: "false"
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          REDIS_HOST: "localhost"
          REDIS_PORT: "6379"
          JWT_SECRET: "test-jwt-secret"
          AI_PROVIDER: "mock"
          ERP_ENABLED: "false"
        run: |
          pytest tests/ \
            --cov=api/ \
            --cov=core/ \
            --cov=web/ \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term \
            --cov-fail-under=70 \
            -v \
            --tb=short

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov/
          retention-days: 30

  # ──────────────────────────────────────────────────────────────
  # Job 3: CodeQL Analysis (security scanning)
  # ──────────────────────────────────────────────────────────────
  codeql-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "language:python"

  # ──────────────────────────────────────────────────────────────
  # Job 4: Docker Build & Test (push on main only)
  # ──────────────────────────────────────────────────────────────
  docker-build-test:
    runs-on: ubuntu-latest
    needs: [lint-and-format, test-and-coverage, codeql-analysis]
    if: github.event_name == 'push' && secrets.DOCKERHUB_USERNAME != ''

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Test Docker image (test stage)
        id: docker_test
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: test
          push: false
          tags: |
            land-copilot:${{ github.sha }}
            land-copilot:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Build and Push Docker image (only on main)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          tags: |
            land-copilot:${{ github.sha }}
            land-copilot:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────
  # Job 5: Validate Files (YAML, large files, license, security doc)
  # ──────────────────────────────────────────────────────────────
  validate-files:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate YAML files
        run: |
          python scripts/validate_yaml.py || true
        continue-on-error: true

      - name: Check for large files (gt; ${{ env.MAX_FILE_SIZE_MB }}MB)
        run: |
          find . -type f -size +"${{ env.MAX_FILE_SIZE_MB }}M" \
            -not -path "./.git/*" \
            -not -path "./node_modules/*" \
            -not -path "./__pycache__/*" \
            -print0 | while IFS= read -r -d '' f; do
              echo "::warning::Large file detected: $f (>${{ env.MAX_FILE_SIZE_MB }}MB)"
            done
        shell: bash

      - name: Check LICENSE file exists and is non-empty
        run: |
          if [ ! -f LICENSE ] || [ ! -s LICENSE ]; then
            echo "::error::LICENSE file is missing or empty!"
            exit 1
          fi
          if grep -qi "all rights reserved" LICENSE; then
            echo "::warning::LICENSE contains 'All rights reserved'. Consider using a standard open source license."
          fi
        shell: bash

      - name: Check SECURITY.md exists and is non-empty
        run: |
          if [ ! -f SECURITY.md ] || [ ! -s SECURITY.md ]; then
            echo "::error::SECURITY.md file is missing or empty!"
            exit 1
          fi
        shell: bash

  # ──────────────────────────────────────────────────────────────
  # Job 6: Notification (alert on failure or cancellation)
  # ──────────────────────────────────────────────────────────────
  notify-failure:
    runs-on: ubuntu-latest
    needs: [lint-and-format, test-and-coverage, codeql-analysis, docker-build-test, validate-files]
    if: failure() || cancelled()

    steps:
      - name: Alert on CI Failure
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runId = context.runId;
            const url = `https://github.com/${owner}/${repo}/actions/runs/${runId}`;
            const body = `❌ **CI/CD Pipeline Failed**\n\n` +
              `View details: ${url}\n\n` +
              `Please fix the failing checks before merging.`;
            github.rest.issues.createComment({
              owner,
              repo,
              issue_number: context.payload.pull_request?.number || 1,
              body
            });
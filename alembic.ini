# Alembic — إعدادات ترحيل قاعدة البيانات
# ===============================================
# الاستخدام:
#   alembic revision --autogenerate -m "create account tables"
#   alembic upgrade head
#   alembic downgrade -1

[alembic]
# المسار إلى ملف env.py
script_location = alembic

# إصدار الترحيل الحالي (يُحدَّث تلقائياً)
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

#_timezone = UTC

# max_length = 40

# sys.pathprepend = .

# إعدادات PostgreSQL — تُقرأ من DATABASE_URL تلقائياً (في env.py)
sqlalchemy.url = driver://postgresql

# إعدادات التسجيل
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S